
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移动端首页</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#2c2c2e;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.phone-frame{width:375px;height:812px;background:#F7F8FA;border-radius:40px;box-shadow:0 0 0 10px #1a1a1a,0 20px 50px rgba(0,0,0,.5);position:relative;overflow:hidden;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#1a1a1a;border-bottom-left-radius:16px;border-bottom-right-radius:16px;z-index:1000}
.screen-content{flex:1;position:relative;overflow:hidden}

.page-view{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;background:#F7F8FA}
.page-view::-webkit-scrollbar{display:none}
.page-view.active{display:block}

.main-tabs{background:#fff;display:flex;justify-content:space-around;padding:40px 10px 10px;border-bottom:1px solid #F2F3F5;position:sticky;top:0;z-index:99}
.main-tab{padding:10px 0;font-size:15px;color:#646A73;position:relative;cursor:pointer}
.main-tab.active{color:#1F2329;font-weight:600;font-size:16px}
.main-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#1F2329;border-radius:2px}

.filter-bar{background:#fff;padding:10px 12px;display:flex;align-items:center;border-bottom:1px solid #F2F3F5;position:sticky;top:0;z-index:98}
.filter-tags-wrap{display:flex;align-items:center;flex:1;overflow-x:auto;scrollbar-width:none}
.filter-tags-wrap::-webkit-scrollbar{display:none}
.filter-tag{font-size:13px;color:#646A73;white-space:nowrap;cursor:pointer;padding:4px 10px;margin-right:4px;border-radius:12px}
.filter-tag.active{color:#1F2329;font-weight:600;background:#F2F3F5}
.dynamic-tag{font-size:12px;color:#165DFF;background:#E8F3FF;padding:4px 10px;border-radius:12px;margin-right:4px;white-space:nowrap;display:none;align-items:center}
.dynamic-tag.show{display:flex}
.dynamic-tag .close-icon{margin-left:4px;font-size:10px;cursor:pointer;opacity:.6}
.btn-more{font-size:13px;color:#646A73;cursor:pointer;white-space:nowrap;margin-left:auto;display:flex;align-items:center}
.btn-more.active{color:#165DFF}
.more-panel{background:#fff;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);display:none;z-index:97;border-bottom:1px solid #F2F3F5}
.more-panel.show{display:block}
.more-tags-grid{display:flex;flex-wrap:wrap;gap:10px}
.more-tag{font-size:12px;padding:6px 12px;background:#F7F8FA;color:#646A73;border-radius:14px;cursor:pointer}
.more-tag.selected{background:#E8F3FF;color:#165DFF}

.supply-list{padding:12px}
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.02);position:relative;cursor:pointer}
.card:active{background:#fafafa}
.card-header{display:flex;align-items:center;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:#E5E6EB;margin-right:10px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:bold;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1;min-width:0}
.user-name-row{display:flex;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.user-name{font-size:15px;font-weight:600;color:#1F2329;margin-right:6px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-right:4px;border:1px solid #E5E6EB;color:#646A73;background:#F7F8FA}
.tag.svip{background:#FFF7E8;color:#D46B08;border-color:#FFD591}
.tag.free{background:#F6FFED;color:#52C41A;border-color:#B7EB8F}
.tag.paid{background:#FFF7E8;color:#D46B08;border-color:#FFD591}
.company-name{font-size:12px;color:#8F959E}
.badge-top{position:absolute;top:16px;right:16px;background:#E8F3FF;color:#165DFF;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.card-title{font-size:16px;line-height:1.5;color:#1F2329;margin-bottom:16px;font-weight:500}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-type-tag{font-size:12px;color:#646A73;background:#F2F3F5;padding:4px 8px;border-radius:4px}
.view-count{font-size:12px;color:#8F959E;display:flex;align-items:center;gap:4px}
.view-count svg{width:14px;height:14px;fill:#8F959E}

.mall-container{background:#fff}
.search-bar{padding:10px 12px;display:flex;align-items:center;background:#fff;border-bottom:1px solid #F2F3F5}
.search-input-wrap{flex:1;background:#F2F3F5;border-radius:20px;padding:8px 14px;font-size:13px;color:#8F959E;display:flex;align-items:center;gap:6px}
.search-input-wrap input{border:none;background:transparent;flex:1;outline:none;font-size:13px;color:#1F2329}
.search-btn{background:#FF4D4F;color:#fff;padding:7px 18px;border-radius:18px;font-size:13px;margin-left:10px;font-weight:500;cursor:pointer;border:none}
.king-kong{display:flex;justify-content:space-around;padding:15px 0 10px;background:#fff}
.kk-item{display:flex;flex-direction:column;align-items:center;font-size:12px;color:#1F2329}
.kk-icon{margin-bottom:6px}
.kk-icon svg{width:32px;height:32px}
.carousel-container{margin:10px 12px;height:120px;border-radius:12px;overflow:hidden;position:relative}
.carousel-track{display:flex;height:100%;transition:transform .5s ease}
.carousel-slide{min-width:100%;height:100%}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
.dot.active{background:#fff;width:12px;border-radius:3px}
.mall-tabs{display:flex;padding:12px;gap:20px;border-bottom:1px solid #F2F3F5;background:#fff;position:sticky;top:0;z-index:90}
.mall-tab{font-size:15px;color:#646A73;white-space:nowrap;position:relative;cursor:pointer}
.mall-tab.active{color:#1F2329;font-weight:600}
.mall-tab.active::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#1F2329;border-radius:2px}
.mall-grid{display:flex;padding:10px;gap:10px;background:#F7F8FA}
.col{flex:1;display:flex;flex-direction:column;gap:10px}
.product-card{background:#fff;border-radius:8px;overflow:hidden}
.prod-img-wrap{position:relative;width:100%;height:140px;background:#eee}
.prod-img{width:100%;height:100%;object-fit:cover}
.hot-badge{position:absolute;top:0;left:0;background:linear-gradient(90deg,#FF4D4F,#FF7875);color:#fff;font-size:10px;padding:4px 8px;border-bottom-right-radius:8px;display:flex;align-items:center;gap:2px}
.prod-info{padding:10px}
.prod-title{font-size:13px;color:#1F2329;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:36px}
.prod-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.prod-price{color:#FF4D4F;font-size:16px;font-weight:bold}
.prod-price span{font-size:11px}
.prod-original-price{color:#BFBFBF;font-size:11px;text-decoration:line-through}
.prod-sales{font-size:11px;color:#8F959E}

.search-page{background:#F7F8FA;min-height:100%}
.search-page-header{background:#fff;padding:44px 12px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #F2F3F5;position:sticky;top:0;z-index:99}
.back-btn{font-size:20px;cursor:pointer;color:#1F2329;padding:4px}
.search-page-input{flex:1;background:#F2F3F5;border-radius:20px;padding:8px 14px;display:flex;align-items:center;gap:6px}
.search-page-input input{border:none;background:transparent;flex:1;outline:none;font-size:13px}
.search-page-btn{font-size:15px;font-weight:600;color:#1F2329;cursor:pointer}
.search-tabs{display:flex;padding:12px;gap:20px;border-bottom:1px solid #F2F3F5;background:#fff;position:sticky;top:0;z-index:90}
.search-tab{font-size:15px;color:#646A73;cursor:pointer;position:relative}
.search-tab.active{color:#FF4D4F;font-weight:600}
.search-tab.active::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#FF4D4F;border-radius:2px}
.search-result-wrap{padding:10px;background:#F7F8FA}

/* 详情页 - 多层sticky固定布局 */
.detail-page{background:#fff;display:flex;flex-direction:column;min-height:100%}
.detail-header{background:#fff;padding:44px 16px 12px;display:flex;align-items:center;border-bottom:1px solid #F2F3F5;position:sticky;top:0;z-index:99;flex-shrink:0}
.detail-title-bar{flex:1;text-align:center;font-size:16px;font-weight:600;color:#1F2329}

/* 固定信息区 */
.detail-info-fixed{background:#fff;position:sticky;top:0;z-index:98;flex-shrink:0;border-bottom:1px solid #F2F3F5}
.detail-main-title{font-size:18px;font-weight:600;color:#1F2329;line-height:1.5;padding:16px 16px 10px}
.detail-meta{display:flex;justify-content:space-between;font-size:12px;color:#8F959E;padding:0 16px 12px}
.detail-user-card{display:flex;align-items:center;padding:12px 16px;background:#F7F8FA;margin:0 16px 12px;border-radius:8px}
.detail-user-info{flex:1;margin-left:10px}
.detail-user-name{font-size:14px;font-weight:600;color:#1F2329;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.detail-user-company{font-size:12px;color:#8F959E;margin-top:2px}
.detail-location{display:flex;justify-content:space-between;font-size:12px;color:#8F959E;padding:0 16px 16px}

/* 可滚动内容区 */
.detail-scroll-content{flex:1;overflow-y:auto;padding:0 16px 20px;-webkit-overflow-scrolling:touch}
.detail-scroll-content::-webkit-scrollbar{display:none}
.detail-section-title{font-size:15px;font-weight:600;color:#1F2329;margin-bottom:12px;text-align:center;position:relative}
.detail-section-title::before,.detail-section-title::after{content:'';position:absolute;top:50%;width:30px;height:1px;background:#E5E6EB}
.detail-section-title::before{left:20%}
.detail-section-title::after{right:20%}
.detail-text{font-size:14px;color:#4E5969;line-height:1.8;margin-bottom:16px}
.detail-text h4{font-size:14px;font-weight:600;color:#1F2329;margin:12px 0 6px}
.detail-images{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto}
.detail-images img{width:100px;height:100px;object-fit:cover;border-radius:6px;flex-shrink:0}
.detail-rating{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#F7F8FA;border-radius:8px;margin-bottom:16px;cursor:pointer}
.detail-rating-left{font-size:13px;color:#646A73;display:flex;align-items:center;gap:4px}
.detail-rating-left svg{width:16px;height:16px;fill:#BFBFBF}
.detail-rating-right{font-size:13px;color:#1F2329}
.detail-stats{display:flex;justify-content:space-around;padding:16px 0;border-top:1px solid #F2F3F5;border-bottom:1px solid #F2F3F5;margin-bottom:16px}
.detail-stat-item{text-align:center}
.detail-stat-num{font-size:18px;font-weight:600;color:#1F2329}
.detail-stat-label{font-size:12px;color:#8F959E;margin-top:4px}
.detail-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.detail-tag{font-size:12px;color:#165DFF;background:#E8F3FF;padding:4px 12px;border-radius:12px;border:1px solid #ADC6FF}
.detail-dynamic-title{font-size:14px;font-weight:600;color:#1F2329;margin-bottom:12px}
.detail-dynamic-item{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F2F3F5}
.detail-dynamic-avatar{width:28px;height:28px;border-radius:50%;background:#E5E6EB;margin-right:10px;flex-shrink:0;overflow:hidden}
.detail-dynamic-avatar img{width:100%;height:100%;object-fit:cover}
.detail-dynamic-content{flex:1}
.detail-dynamic-user{font-size:13px;color:#1F2329;margin-bottom:4px}
.detail-dynamic-text{font-size:12px;color:#646A73}
.detail-dynamic-time{font-size:11px;color:#BFBFBF;flex-shrink:0}
.detail-more-dynamic{text-align:center;padding:12px;font-size:13px;color:#165DFF;cursor:pointer}
.detail-safety{background:#FFF7E8;padding:12px;border-radius:8px;margin-bottom:20px}
.detail-safety-title{font-size:13px;font-weight:600;color:#D46B08;margin-bottom:6px}
.detail-safety-text{font-size:11px;color:#8F959E;line-height:1.6}
.detail-safety-text a{color:#165DFF}

/* 底部固定按钮栏 */
.detail-bottom-bar{background:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #F2F3F5;position:sticky;bottom:0;z-index:99;flex-shrink:0}
.detail-bottom-icon{display:flex;flex-direction:column;align-items:center;font-size:10px;color:#646A73;cursor:pointer;min-width:40px}
.detail-bottom-icon svg{width:22px;height:22px;fill:#646A73;margin-bottom:2px}
.detail-bottom-btn{flex:1;background:#165DFF;color:#fff;border:none;padding:12px;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}

.rating-page{background:#F7F8FA}
.rating-header{background:#fff;padding:44px 16px 12px;display:flex;align-items:center;border-bottom:1px solid #F2F3F5;position:sticky;top:0;z-index:99}
.rating-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#1F2329}
.rating-body{padding:20px 16px}
.rating-subtitle{text-align:center;font-size:14px;color:#1F2329;margin-bottom:20px}
.stars-container{display:flex;justify-content:center;gap:20px;padding:20px;background:#fff;border-radius:12px;margin-bottom:20px}
.star{font-size:32px;cursor:pointer;color:#D9D9D9;transition:color .2s}
.star.filled{color:#FAAD14}
.rating-tags-section{margin-bottom:20px}
.rating-tags-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rating-tag{padding:12px 8px;border-radius:8px;font-size:13px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent}
.rating-tag.positive{background:#F0F0F0;color:#1F2329}
.rating-tag.negative{background:#F5F0F0;color:#8F959E}
.rating-tag.selected{border-color:#165DFF;background:#E8F3FF;color:#165DFF}
.anonymity-row{display:flex;align-items:center;gap:8px;padding:16px 0;margin-bottom:20px}
.anonymity-checkbox{width:20px;height:20px;border:2px solid #D9D9D9;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.anonymity-checkbox.checked{background:#165DFF;border-color:#165DFF}
.anonymity-checkbox.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:bold}
.anonymity-label{font-size:14px;color:#1F2329}
.anonymity-label span{font-size:12px;color:#8F959E}
.rating-submit-btn{width:100%;padding:14px;background:#165DFF;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer}

.placeholder-page{display:flex;align-items:center;justify-content:center;height:60vh;color:#999;font-size:14px}
</style>
</head>

<div class="notch"></div>
<div class="screen-content">

function showRating(){

body.innerHTML=`
<div class="rating-subtitle">对该资源帖子进行评分</div>
<div class="stars-container" id="starsContainer">

</div>
<div class="rating-tags-section">
<div class="rating-tags-grid" id="positiveTags">
${positiveTags.map(t=>`<div class="rating-tag positive" data-tag="${t}">${t}</div>`).join('')}
</div>
</div>
<div class="rating-tags-section">
<div class="rating-tags-grid" id="negativeTags">
${negativeTags.map(t=>`<div class="rating-tag negative" data-tag="${t}">${t}</div>`).join('')}
</div>
</div>
<div class="anonymity-row">
<div class="anonymity-checkbox" id="anonymityCheck"></div>
<div class="anonymity-label">匿名 <span>匿名评分会隐藏头像和昵称</span></div>
</div>
<button class="rating-submit-btn" id="ratingSubmitBtn">提交</button>`;

body.querySelectorAll('.star').forEach(s=>{
s.addEventListener('click',function(){
ratingStars=parseInt(this.getAttribute('data-star'));
body.querySelectorAll('.star').forEach((st,i)=>st.classList.toggle('filled',i<ratingStars));
});
});
body.querySelectorAll('.rating-tag').forEach(t=>{
t.addEventListener('click',function(){
const tag=this.getAttribute('data-tag');
if(ratingSelectedTags.includes(tag)){
ratingSelectedTags=ratingSelectedTags.filter(x=>x!==tag);
this.classList.remove('selected');
}else{
ratingSelectedTags.push(tag);
this.classList.add('selected');
}
});
});
body.querySelector('#anonymityCheck').addEventListener('click',function(){
ratingAnonymous=!ratingAnonymous;
this.classList.toggle('checked',ratingAnonymous);
});
body.querySelector('#ratingSubmitBtn').addEventListener('click',function(){
alert('评分提交成功！\n星级：'+ratingStars+'\n标签：'+ratingSelectedTags.join('、')+'\n匿名：'+(ratingAnonymous?'是':'否'));
showPage('detail');
});
showPage('rating');
}

function bindMallEvents(){
const si=document.getElementById('mallSearchInput');
const sb=document.getElementById('mallSearchBtn');
if(sb)sb.addEventListener('click',()=>{
document.getElementById('searchPageInput').value=si?si.value:'';
showPage('search');
renderMallList('all','searchResultWrap');
});
const mt=document.querySelectorAll('#mallTabs .mall-tab');
mt.forEach(t=>t.addEventListener('click',function(){
mt.forEach(x=>x.classList.remove('active'));
this.classList.add('active');
renderMallList(this.getAttribute('data-mall-filter'));
}));
let slide=0;
const track=document.getElementById('carouselTrack');
const dots=document.querySelectorAll('#carouselDots .dot');
if(track)setInterval(()=>{slide=(slide+1)%3;track.style.transform=`translateX(-${slide*100}%)`;dots.forEach((d,i)=>d.classList.toggle('active',i===slide))},3000);
}

document.addEventListener('DOMContentLoaded',function(){
document.querySelectorAll('#mainTabs .main-tab').forEach(tab=>{
tab.addEventListener('click',function(){
document.querySelectorAll('#mainTabs .main-tab').forEach(t=>t.classList.remove('active'));
this.classList.add('active');
renderHomeContent(this.getAttribute('data-target'));
});
});

const filterTags=document.querySelectorAll('.filter-tag');
filterTags.forEach(tag=>{
tag.addEventListener('click',function(){
filterTags.forEach(t=>t.classList.remove('active'));
this.classList.add('active');
currentMainFilter=this.getAttribute('data-filter');
currentSubFilter=null;
document.getElementById('dynamicTag').classList.remove('show');
document.querySelectorAll('.more-tag').forEach(t=>t.classList.remove('selected'));
renderSupplyList();
});
});

document.getElementById('btnMore').addEventListener('click',function(e){
e.stopPropagation();
document.getElementById('morePanel').classList.toggle('show');
this.classList.toggle('active');
});
document.addEventListener('click',function(e){
const mp=document.getElementById('morePanel');
const bm=document.getElementById('btnMore');
if(!mp.contains(e.target)&&e.target!==bm){mp.classList.remove('show');bm.classList.remove('active')}
});

document.querySelectorAll('.more-tag').forEach(tag=>{
tag.addEventListener('click',function(){
document.querySelectorAll('.more-tag').forEach(t=>t.classList.remove('selected'));
this.classList.add('selected');
currentSubFilter=this.getAttribute('data-filter');
document.getElementById('dynamicTagText').textContent=this.textContent;
document.getElementById('dynamicTag').classList.add('show');
filterTags.forEach(t=>t.classList.remove('active'));
document.getElementById('morePanel').classList.remove('show');
document.getElementById('btnMore').classList.remove('active');
renderSupplyList();
});
});

document.getElementById('closeDynamicTag').addEventListener('click',function(e){
e.stopPropagation();
currentSubFilter=null;
document.getElementById('dynamicTag').classList.remove('show');
document.querySelectorAll('.more-tag').forEach(t=>t.classList.remove('selected'));
document.querySelector('.filter-tag[data-filter="all"]').classList.add('active');
renderSupplyList();
});

document.getElementById('detailBackBtn').addEventListener('click',()=>showPage('home'));
document.getElementById('ratingBackBtn').addEventListener('click',()=>showPage('detail'));
document.getElementById('searchBackBtn').addEventListener('click',()=>showPage('home'));

document.getElementById('searchPageBtn').addEventListener('click',function(){
const active=document.querySelector('#searchTabs .search-tab.active');
renderMallList(active?active.getAttribute('data-search-filter'):'all','searchResultWrap');
});
document.querySelectorAll('#searchTabs .search-tab').forEach(tab=>{
tab.addEventListener('click',function(){
document.querySelectorAll('#searchTabs .search-tab').forEach(t=>t.classList.remove('active'));
this.classList.add('active');
renderMallList(this.getAttribute('data-search-filter'),'searchResultWrap');
});
});

document.getElementById('detailScrollContent').addEventListener('click',function(e){
if(e.target.closest('#ratingEntry'))showRating();
});
document.getElementById('detailBottomBar').addEventListener('click',function(e){
if(e.target.closest('#btnReport'))alert('举报已提交');
if(e.target.closest('#btnShare'))alert('分享链接已复制');
if(e.target.closest('#btnLike')){
const icon=e.target.closest('#btnLike').querySelector('svg');
icon.style.fill=icon.style.fill==='rgb(255, 77, 79)'?'#646A73':'#FF4D4F';
}
});

renderHomeContent('supply');
});
</script>
</body>
</html>
