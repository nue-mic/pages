<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nue · 站点索引</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090F; --panel:#10131F; --panel-2:#161A2A;
  --ink:#EAECF3; --muted:#828BA3; --line:rgba(255,255,255,.08);
  --violet:#6D5EF6; --teal:#2DD4BF; --rose:#FB7185;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;filter:blur(80px);opacity:.55}
.aurora span{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 22s ease-in-out infinite}
.aurora .a{width:44vw;height:44vw;left:-8vw;top:-10vw;background:radial-gradient(circle,#6D5EF6,transparent 65%)}
.aurora .b{width:40vw;height:40vw;right:-6vw;top:6vh;background:radial-gradient(circle,#2DD4BF,transparent 65%);animation-delay:-7s}
.aurora .c{width:36vw;height:36vw;left:30vw;bottom:-14vw;background:radial-gradient(circle,#FB7185,transparent 65%);animation-delay:-13s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(6vw,4vh) scale(1.08)}66%{transform:translate(-4vw,-3vh) scale(.95)}}

.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:56px 24px 80px}

.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:46px;height:46px;border-radius:13px;position:relative;
  background:conic-gradient(from 210deg,var(--violet),var(--teal),var(--rose),var(--violet));
  box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 30px rgba(109,94,246,.35)}
.logo::after{content:"";position:absolute;inset:6px;border-radius:8px;background:var(--bg)}
.logo b{position:absolute;inset:0;display:grid;place-items:center;font-family:"Space Grotesk";font-weight:700;font-size:19px;z-index:2;
  background:linear-gradient(120deg,#fff,#c8c2ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand h1{font-family:"Space Grotesk";font-weight:600;font-size:19px;letter-spacing:.2px}
.brand p{font-size:12.5px;color:var(--muted);margin-top:2px;font-family:"JetBrains Mono"}
.stat{font-family:"JetBrains Mono";font-size:12.5px;color:var(--muted);text-align:right;line-height:1.7}
.stat b{color:var(--teal)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-right:6px;box-shadow:0 0 8px var(--teal);vertical-align:middle;animation:pulse 2.4s infinite}
@keyframes pulse{50%{opacity:.35}}

.hero{margin:44px 0 30px}
.hero h2{font-family:"Space Grotesk";font-weight:700;font-size:clamp(34px,6vw,60px);line-height:1.02;letter-spacing:-1.5px}
.hero h2 .g{background:linear-gradient(100deg,var(--violet),var(--teal) 55%,var(--rose));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{margin-top:16px;color:var(--muted);font-size:15.5px;max-width:520px;line-height:1.6}

.search{margin:26px 0 8px;position:relative;max-width:460px}
.search input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  font-size:14.5px;font-family:inherit;padding:14px 16px 14px 44px;border-radius:14px;outline:none;transition:.2s}
.search input:focus{border-color:rgba(109,94,246,.6);box-shadow:0 0 0 4px rgba(109,94,246,.14)}
.search input::placeholder{color:var(--muted)}
.search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--muted)}
.search kbd{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:"JetBrains Mono";font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px;background:var(--panel-2)}

.grid{margin-top:30px;display:grid;gap:22px;grid-template-columns:repeat(auto-fill,minmax(268px,1fr))}
.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.2,.7,.2,1),border-color .28s,box-shadow .28s}
.card:hover{transform:translateY(-6px);border-color:rgba(109,94,246,.5);box-shadow:0 18px 44px -18px rgba(109,94,246,.55)}
.card:focus-visible{outline:2px solid var(--teal);outline-offset:3px}
.shot{position:relative;height:300px;overflow:hidden;background:var(--panel-2);border-bottom:1px solid var(--line)}
.shot .ph{position:absolute;inset:0;background:
  radial-gradient(120% 90% at 20% 0%,rgba(109,94,246,.28),transparent 60%),
  radial-gradient(120% 90% at 90% 30%,rgba(45,212,191,.22),transparent 60%);
  display:grid;place-items:center}
.shot .ph span{font-family:"Space Grotesk";font-weight:700;font-size:40px;color:rgba(255,255,255,.14);letter-spacing:1px}
.shot iframe{position:absolute;top:0;left:0;width:1280px;height:900px;border:0;transform-origin:top left;pointer-events:none;background:#fff;opacity:0;transition:opacity .5s}
.shot iframe.on{opacity:1}
.badge{position:absolute;top:11px;right:11px;z-index:3;font-family:"JetBrains Mono";font-size:10.5px;font-weight:500;letter-spacing:.3px;
  padding:3px 8px;border-radius:20px;color:#fff;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18)}
.badge.mobile{background:rgba(45,212,191,.22)}
.badge.pc{background:rgba(109,94,246,.28)}
.glow{position:absolute;left:0;right:0;bottom:0;height:70px;background:linear-gradient(to top,rgba(16,19,31,.9),transparent);pointer-events:none}
.meta{padding:15px 16px 16px}
.meta .row{display:flex;align-items:center;gap:9px}
.idx{font-family:"JetBrains Mono";font-size:11px;color:var(--violet);border:1px solid rgba(109,94,246,.35);border-radius:6px;padding:1px 6px}
.meta h3{font-family:"Space Grotesk";font-weight:600;font-size:16.5px}
.meta p{color:var(--muted);font-size:13px;margin-top:7px;line-height:1.5;min-height:19px}
.foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px}
.path{font-family:"JetBrains Mono";font-size:11.5px;color:var(--muted);opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.open{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--teal);font-weight:600;white-space:nowrap}
.open svg{width:13px;height:13px;stroke:currentColor;transition:transform .25s}
.card:hover .open svg{transform:translate(2px,-2px)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
.tag{font-size:11px;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:2px 9px}

.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted)}
.empty b{display:block;color:var(--ink);font-family:"Space Grotesk";font-size:18px;margin-bottom:8px}

footer{margin-top:60px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  font-family:"JetBrains Mono";font-size:12px;color:var(--muted)}
footer a{color:var(--muted);text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.2)}

@media (max-width:560px){.wrap{padding:36px 16px 60px}.shot{height:260px}}
@media (prefers-reduced-motion:reduce){.aurora span{animation:none}.card{transition:none}}
</style>
</head>
<body>
<div class="aurora"><span class="a"></span><span class="b"></span><span class="c"></span></div>

<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo"><b>N</b></div>
      <div>
        <h1>nue · 站点索引</h1>
        <p>nue-mic.github.io/pages</p>
      </div>
    </div>
    <div class="stat">
      <div><span class="dot"></span>全部在线</div>
      <div><b id="count">0</b> 个项目</div>
    </div>
  </div>

  <div class="hero">
    <h2>作品<span class="g">发布台</span>。</h2>
    <p class="sub">这里汇集所有已上线的网页，移动端与 PC 皆可。每张卡片都是页面的实时预览——点开即达。</p>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="text" placeholder="搜索项目名、描述或标签…" autocomplete="off" spellcheck="false">
      <kbd>/</kbd>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <span>© <span id="yr"></span> nue-mic · GitHub Pages</span>
    <span>点击卡片在新标签打开 · <a href="https://github.com/nue-mic/pages" target="_blank" rel="noopener">仓库</a></span>
  </footer>
</div>

<script>
const META = {
  "yq2": { title: "仪圈", desc: "移动端首页 · 新一波改动", tags: ["移动端","H5"], type: "mobile" },
  "yqh-fund-chain-status": { title: "悦轻荷 · 资金链路现状图", desc: "支付 → 分账 → 提现 全链路打通视图（脱敏）", tags: ["资金","脱敏"], type: "pc" }
};
const PROJECTS = ["yq2", "yqh-fund-chain-status"];
const DEFAULT_TYPE = "pc";
const VW = { mobile: 390, pc: 1280 };
const REPO = "nue-mic/pages";
const BASE = "./";

const grid = document.getElementById('grid');
const qEl = document.getElementById('q');
let cards = [];

function cardHTML(slug, i){
  const m = META[slug] || {};
  const title = m.title || slug;
  const desc = m.desc || "";
  const tags = m.tags || [];
  const type = m.type || DEFAULT_TYPE;
  const vw = VW[type] || VW.pc;
  const badge = type === "mobile" ? "移动端" : "PC";
  const url = BASE + slug + "/";
  const idx = String(i+1).padStart(2,'0');
  return `<a class="card" href="${url}" target="_blank" rel="noopener" data-key="${(slug+' '+title+' '+desc+' '+tags.join(' ')+' '+badge).toLowerCase()}">
    <div class="shot">
      <div class="ph"><span>${(title[0]||slug[0]||'·').toUpperCase()}</span></div>
      <iframe data-src="${url}" data-vw="${vw}" loading="lazy" scrolling="no" title="${title} 预览"></iframe>
      <div class="glow"></div>
      <span class="badge ${type}">${badge}</span>
    </div>
    <div class="meta">
      <div class="row"><span class="idx">${idx}</span><h3>${title}</h3></div>
      <p>${desc || '&nbsp;'}</p>
      <div class="foot">
        <span class="path">/pages/${slug}/</span>
        <span class="open">打开<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M8 7h9v9"/></svg></span>
      </div>
      ${tags.length?`<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
    </div>
  </a>`;
}

function render(slugs){
  grid.innerHTML = slugs.map((s,i)=>cardHTML(s,i)).join('') ||
    `<div class="empty"><b>还没有项目</b>往 pages 仓库里加一个文件夹就会出现在这里。</div>`;
  document.getElementById('count').textContent = slugs.length;
  cards = [...grid.querySelectorAll('.card')];
  setupPreviews();
}

function setupPreviews(){
  const io = new IntersectionObserver((es)=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        const f = e.target;
        if(!f.src){ f.src = f.dataset.src; f.addEventListener('load',()=>f.classList.add('on'),{once:true}); }
        io.unobserve(f);
      }
    });
  },{rootMargin:"200px"});
  grid.querySelectorAll('iframe').forEach(f=>io.observe(f));
  scaleAll();
}
function scaleAll(){
  grid.querySelectorAll('.shot').forEach(shot=>{
    const f = shot.querySelector('iframe');
    if(f){ const vw = +f.dataset.vw || 1280; const s = shot.clientWidth/vw;
      f.style.width = vw+'px'; f.style.transform = `scale(${s})`; }
  });
}
window.addEventListener('resize',scaleAll);

qEl.addEventListener('input',()=>{
  const q = qEl.value.trim().toLowerCase();
  let shown = 0;
  cards.forEach(c=>{
    const hit = !q || c.dataset.key.includes(q);
    c.style.display = hit?'':'none';
    if(hit) shown++;
  });
  document.getElementById('count').textContent = shown;
});
document.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement!==qEl){ e.preventDefault(); qEl.focus(); }
  if(e.key==='Escape'){ qEl.value=''; qEl.dispatchEvent(new Event('input')); qEl.blur(); }
});

function sortSlugs(slugs){
  const order = Object.keys(META);
  return slugs.slice().sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b);
    if(ia>-1||ib>-1) return (ia>-1?ia:99)-(ib>-1?ib:99);
    return a.localeCompare(b);
  });
}

function load(){
  const base = (PROJECTS.length ? PROJECTS : Object.keys(META)).slice();
  render(sortSlugs(base));
  discover(base);
}
async function discover(base){
  try{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), 3500);
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/?ref=main`,
      {headers:{'Accept':'application/vnd.github+json'},signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return;
    const items = await r.json();
    if(!Array.isArray(items)) return;
    const found = items.filter(x=>x.type==='dir' && !x.name.startsWith('.')).map(x=>x.name);
    const merged = Array.from(new Set([...base, ...found]));
    if(merged.length !== base.length){
      render(sortSlugs(merged));
      qEl.dispatchEvent(new Event('input'));
    }
  }catch(e){}
}

document.getElementById('yr').textContent = new Date().getFullYear();
load();
</script>
</body>
</html>
