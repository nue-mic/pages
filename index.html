<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>悦轻荷 · 页面发布站</title>
<meta name="description" content="悦轻荷供应链对外页面发布站，集中收录脱敏展示页与对外沟通文档。" />
<meta property="og:type" content="website" />
<meta property="og:title" content="悦轻荷 · 页面发布站" />
<meta property="og:description" content="悦轻荷供应链对外页面发布站，集中收录脱敏展示页与对外沟通文档。" />
<style>
  :root{
    --ink:#0E2233;          /* 深钢蓝墨 */
    --ink-2:#33485c;
    --muted:#5B7085;
    --bg:#EAEFF4;           /* 冷灰白 */
    --card:#FFFFFF;
    --line:#D5DEE7;
    --flow:#1C7ED6;         /* 主题蓝 */
    --ok:#1E9E6A;
    --warn:#D99400;
    --stop:#D6455D;
    --shadow:0 1px 2px rgba(14,34,51,.06), 0 8px 24px rgba(14,34,51,.07);
    --shadow-lift:0 2px 4px rgba(14,34,51,.08), 0 18px 40px rgba(14,34,51,.12);
    --font: "Segoe UI Variable Display","Segoe UI","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #F3F7FB 0%, transparent 60%),
      var(--bg);
    line-height:1.55;
    padding:56px 24px 72px;
    letter-spacing:.1px;
    min-height:100vh;
  }
  .wrap{max-width:960px;margin:0 auto}

  /* ---------- header ---------- */
  header{margin-bottom:36px}
  .eyebrow{
    font-size:12px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;
    color:var(--flow);margin-bottom:12px;
  }
  h1{
    font-size:clamp(30px,4.6vw,44px);font-weight:800;line-height:1.06;
    letter-spacing:-.6px;color:var(--ink);
  }
  h1 .thin{font-weight:400;color:var(--ink-2)}
  .sub{margin-top:14px;color:var(--muted);font-size:15.5px;max-width:60ch}
  .meta{
    margin-top:18px;display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center;
    font-size:13px;color:var(--muted);
  }
  .meta b{color:var(--ink);font-weight:700}

  /* ---------- section label ---------- */
  h2.section{
    font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin:38px 0 16px;padding-top:26px;border-top:1px solid var(--line)
  }

  /* ---------- cards grid ---------- */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;
  }
  a.card{
    display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 20px 18px;box-shadow:var(--shadow);
    border-left:4px solid var(--nc,var(--flow));
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    outline:none;
  }
  a.card:hover, a.card:focus-visible{
    transform:translateY(-3px);box-shadow:var(--shadow-lift);
  }
  a.card:focus-visible{border-color:var(--flow);box-shadow:var(--shadow-lift),0 0 0 3px rgba(28,126,214,.28)}
  .card .top{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:2px}
  .card h3{font-size:17.5px;font-weight:750;letter-spacing:-.2px}
  .badge{
    font-size:11.5px;font-weight:800;letter-spacing:.4px;
    padding:4px 10px;border-radius:999px;white-space:nowrap;
  }
  .badge.ok{background:rgba(30,158,106,.12);color:#137a4f}
  .badge.warn{background:rgba(217,148,0,.14);color:#9a6b00}
  .card p.desc{margin-top:9px;font-size:13.7px;color:var(--ink-2);flex:1}
  .card .foot{
    margin-top:16px;padding-top:13px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    font-size:12.5px;color:var(--muted);
  }
  .card .foot .date b{color:var(--ink-2);font-weight:700}
  .card .go{
    display:inline-flex;align-items:center;gap:6px;
    font-weight:700;color:var(--flow);font-size:12.8px;
  }
  .card .go svg{transition:transform .18s ease}
  a.card:hover .go svg{transform:translateX(3px)}

  /* ---------- 占位卡（预留结构） ---------- */
  .card.placeholder{
    border-style:dashed;border-left-style:dashed;background:transparent;box-shadow:none;
    color:var(--muted);align-items:center;justify-content:center;text-align:center;
    min-height:150px;cursor:default;--nc:var(--line);
  }
  .card.placeholder:hover{transform:none;box-shadow:none}
  .card.placeholder .plus{
    width:32px;height:32px;border-radius:50%;border:1.5px dashed var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:400;margin-bottom:10px;
  }
  .card.placeholder p{font-size:13px}

  footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);text-align:center}

  @media (prefers-reduced-motion:no-preference){
    a.card{animation:rise .5s ease both}
    .grid a.card:nth-child(2){animation-delay:.06s}
    .grid a.card:nth-child(3){animation-delay:.12s}
    @keyframes rise{from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none}}
  }
  @media (max-width:680px){
    body{padding:36px 16px 56px}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">悦轻荷供应链 · 对外发布</div>
    <h1>页面发布站<br><span class="thin">脱敏展示页与对外沟通文档索引</span></h1>
    <p class="sub">这里集中收录悦轻荷对外公开的脱敏页面。每个页面独立成册，点击卡片即可查看。</p>
    <div class="meta">
      <span>维护 <b>悦轻荷供应链团队</b></span>
      <span>最近更新 <b>2026-07-22</b></span>
    </div>
  </header>

  <h2 class="section">已发布页面</h2>
  <div class="grid">

    <!-- 卡片 1：资金链路现状图 -->
    <a class="card" href="./yqh-fund-chain-status/" style="--nc:var(--flow)">
      <div class="top">
        <h3>资金链路现状图</h3>
        <span class="badge ok">脱敏</span>
      </div>
      <p class="desc">按资金实际流动的顺序，展示收款 → 分账 → 提现全链路各环节的打通情况与待推进节点。</p>
      <div class="foot">
        <span class="date">更新 <b>2026-07-22</b></span>
        <span class="go">查看
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </div>
    </a>

    <!-- 预留结构：以后新增页面复制上面的 <a class="card"> 即可 -->
    <div class="card placeholder" aria-hidden="true">
      <div class="plus">+</div>
      <p>后续新页面<br>将陆续收录于此</p>
    </div>

  </div>

  <footer>
    悦轻荷供应链 · 页面发布站　|　仅收录脱敏对外内容　|　https://nue-mic.github.io/pages/
  </footer>

</div>
</body>
</html>
